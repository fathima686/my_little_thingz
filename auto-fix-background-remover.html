<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Fix Background Remover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
        }
        
        .emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .message {
            color: #666;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .steps {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 15px;
        }
        
        .step-number {
            background: #6366f1;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .step-text {
            flex: 1;
            color: #333;
            line-height: 1.6;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            flex-direction: column;
        }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        
        .btn-primary {
            background: #6366f1;
            color: white;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .code-box {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        
        .alert.success {
            background: #ecfdf5;
            border: 2px solid #10b981;
            color: #065f46;
        }
        
        .alert.error {
            background: #fef2f2;
            border: 2px solid #ef4444;
            color: #991b1b;
        }
        
        .keyboard-key {
            display: inline-block;
            padding: 4px 8px;
            background: #e5e7eb;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            box-shadow: 0 2px 0 #d1d5db;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🔧</div>
        <h1>Background Remover Fix</h1>
        <p class="message">
            Your browser is loading the OLD JavaScript file.<br>
            Choose a fix method below:
        </p>
        
        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <div class="step-text">
                    <strong>Hard Refresh (Recommended)</strong><br>
                    Press <span class="keyboard-key">Ctrl</span> + <span class="keyboard-key">Shift</span> + <span class="keyboard-key">R</span>
                    on the design editor page
                </div>
            </div>
            
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-text">
                    <strong>Or use the console fix below</strong><br>
                    Copy the code and paste in browser console (F12)
                </div>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="openEditor()">
                🎨 Open Design Editor & Hard Refresh
            </button>
            
            <button class="btn-success" onclick="copyFix()">
                📋 Copy Console Fix Code
            </button>
        </div>
        
        <div class="alert" id="alertBox"></div>
        
        <div class="code-box" id="codeBox" style="display: none;">
            <pre id="fixCode"></pre>
        </div>
    </div>
    
    <script>
        const fixCode = `(function(){
    console.log('%c⚡ FIXING BACKGROUND REMOVER...', 'background: #6366f1; color: white; padding: 10px; font-size: 16px; font-weight: bold;');
    
    let editor = window.editor || window.designEditor;
    
    if (!editor) {
        alert('❌ Editor not found! Please refresh the page and try again.');
        return;
    }
    
    console.log('✅ Editor found');
    
    editor.removeBackground = async function() {
        console.log('🎨 Remove background started');
        
        if (!this.selectedObject || this.selectedObject.type !== 'image') {
            alert('⚠️ Please select an image first!');
            return;
        }
        
        try {
            this.showCanvasLoading(true);
            console.log('📤 Processing image...');
            
            const imageElement = this.selectedObject.getElement();
            const canvas = document.createElement('canvas');
            canvas.width = imageElement.naturalWidth || imageElement.width;
            canvas.height = imageElement.naturalHeight || imageElement.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(imageElement, 0, 0);
            
            console.log('✅ Image extracted, removing background...');
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            const threshold = 240;
            let pixelsChanged = 0;
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                if (r > threshold && g > threshold && b > threshold) {
                    data[i + 3] = 0;
                    pixelsChanged++;
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            const processedImage = canvas.toDataURL('image/png');
            
            console.log(\`✅ Background removed! Changed \${pixelsChanged} pixels\`);
            
            const self = this;
            fabric.Image.fromURL(processedImage, function(img) {
                const left = self.selectedObject.left;
                const top = self.selectedObject.top;
                const scaleX = self.selectedObject.scaleX;
                const scaleY = self.selectedObject.scaleY;
                const angle = self.selectedObject.angle;
                
                self.canvas.remove(self.selectedObject);
                
                img.set({
                    left: left,
                    top: top,
                    scaleX: scaleX,
                    scaleY: scaleY,
                    angle: angle
                });
                
                self.canvas.add(img);
                self.canvas.setActiveObject(img);
                self.canvas.renderAll();
                
                self.selectedObject = img;
                self.showCanvasLoading(false);
                
                console.log('✅ Done!');
                alert('✅ Background removed successfully!');
            }, { crossOrigin: 'anonymous' });
            
        } catch (error) {
            console.error('❌ Error:', error);
            this.showCanvasLoading(false);
            alert('❌ Error: ' + error.message);
        }
    };
    
    if (!editor.hideLoading) {
        editor.hideLoading = function() {
            this.showCanvasLoading(false);
        };
    }
    
    const btn = document.getElementById('removeBackgroundBtn');
    if (btn) {
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.onclick = function() {
            console.log('🖱️ Button clicked!');
            editor.removeBackground();
        };
        console.log('✅ Button re-bound');
    }
    
    window.editor = editor;
    
    console.log('%c✅ FIX COMPLETE!', 'background: #10b981; color: white; padding: 10px; font-size: 14px; font-weight: bold;');
    alert('✅ Background Remover is now FIXED!\\n\\n1. Upload an image\\n2. Select it\\n3. Click "Remove Background"\\n4. Done! ✨');
})();`;
        
        function showAlert(message, type) {
            const alert = document.getElementById('alertBox');
            alert.className = `alert ${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }
        
        function openEditor() {
            const url = '../frontend/admin/design-editor.html';
            window.open(url, '_blank');
            showAlert('✅ Opening design editor. Remember to press Ctrl+Shift+R to hard refresh!', 'success');
        }
        
        function copyFix() {
            navigator.clipboard.writeText(fixCode).then(() => {
                document.getElementById('codeBox').style.display = 'block';
                document.getElementById('fixCode').textContent = fixCode;
                showAlert('✅ Code copied! Now:\n1. Open design editor\n2. Press F12\n3. Paste in console\n4. Press Enter', 'success');
            }).catch(err => {
                document.getElementById('codeBox').style.display = 'block';
                document.getElementById('fixCode').textContent = fixCode;
                showAlert('⚠️ Copy failed. Please copy manually from the box below.', 'error');
            });
        }
    </script>
</body>
</html>
