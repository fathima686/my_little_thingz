<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft Validation Dashboard - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        .pending { color: #f39c12; }
        .approved { color: #27ae60; }
        .rejected { color: #e74c3c; }
        .flagged { color: #e67e22; }

        .filters {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-weight: 500;
            color: #333;
        }

        select, input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .submissions-container {
            padding: 30px;
        }

        .submission-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .submission-header {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .submission-info {
            flex: 1;
        }

        .submission-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .submission-meta {
            color: #666;
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .status-flagged {
            background: #ffeaa7;
            color: #d63031;
        }

        .submission-content {
            padding: 20px;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .image-analysis {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .image-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f5f5f5;
        }

        .image-details {
            padding: 15px;
        }

        .image-filename {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .validation-results {
            margin-bottom: 15px;
        }

        .validation-section {
            margin-bottom: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }

        .validation-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin: 5px 0;
        }

        .confidence-fill {
            height: 100%;
            transition: width 0.3s ease;
        }

        .confidence-high { background: #27ae60; }
        .confidence-medium { background: #f39c12; }
        .confidence-low { background: #e74c3c; }

        .prediction-list {
            font-size: 0.9rem;
            color: #666;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .ai-warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            color: #856404;
        }

        .ai-warning strong {
            color: #d63031;
        }

        .admin-actions {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-approve {
            background: #27ae60;
            color: white;
        }

        .btn-approve:hover {
            background: #229954;
        }

        .btn-reject {
            background: #e74c3c;
            color: white;
        }

        .btn-reject:hover {
            background: #c0392b;
        }

        .admin-notes {
            flex: 1;
            min-width: 200px;
            margin-right: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .metadata-toggle {
            background: #6c757d;
            color: white;
            font-size: 0.8rem;
            padding: 5px 10px;
            margin-top: 10px;
        }

        .metadata-details {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: #f1f3f4;
            border-radius: 5px;
            font-size: 0.8rem;
            color: #666;
        }

        .metadata-details.show {
            display: block;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                justify-content: space-between;
            }
            
            .images-grid {
                grid-template-columns: 1fr;
            }
            
            .admin-actions {
                flex-direction: column;
                align-items: stretch;
            }
            
            .admin-notes {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Craft Validation Dashboard</h1>
            <p>AI-Assisted Practice Image Review & Approval System</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number pending" id="pendingCount">-</div>
                <div class="stat-label">Pending Review</div>
            </div>
            <div class="stat-card">
                <div class="stat-number flagged" id="flaggedCount">-</div>
                <div class="stat-label">Flagged Images</div>
            </div>
            <div class="stat-card">
                <div class="stat-number rejected" id="rejectedCount">-</div>
                <div class="stat-label">Rejected Images</div>
            </div>
            <div class="stat-card">
                <div class="stat-number approved" id="approvedCount">-</div>
                <div class="stat-label">Approved Today</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="statusFilter">Status:</label>
                <select id="statusFilter">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending Review</option>
                    <option value="flagged">Flagged</option>
                    <option value="rejected">Rejected</option>
                    <option value="approved">Approved</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="categoryFilter">Category:</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="candle_making">Candle Making</option>
                    <option value="clay_modeling">Clay Modeling</option>
                    <option value="gift_making">Gift Making</option>
                    <option value="hand_embroidery">Hand Embroidery</option>
                    <option value="jewelry_making">Jewelry Making</option>
                    <option value="mehandi_art">Mehandi Art</option>
                    <option value="resin_art">Resin Art</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="dateFilter">Date:</label>
                <input type="date" id="dateFilter">
            </div>
            <button class="btn btn-primary" onclick="loadSubmissions()">🔄 Refresh</button>
        </div>

        <div class="submissions-container">
            <div id="loadingIndicator" class="loading">
                <p>Loading submissions...</p>
            </div>
            <div id="submissionsList"></div>
        </div>
    </div>

    <script>
        // Global variables
        let submissions = [];
        let stats = {};

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadSubmissions();
            
            // Set up auto-refresh every 30 seconds
            setInterval(loadStats, 30000);
        });

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('../../api/admin/craft-validation-stats.php');
                const data = await response.json();
                
                if (data.success) {
                    stats = data.stats;
                    updateStatsDisplay();
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Update statistics display
        function updateStatsDisplay() {
            document.getElementById('pendingCount').textContent = stats.pending || 0;
            document.getElementById('flaggedCount').textContent = stats.flagged || 0;
            document.getElementById('rejectedCount').textContent = stats.rejected || 0;
            document.getElementById('approvedCount').textContent = stats.approved_today || 0;
        }

        // Load submissions
        async function loadSubmissions() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const submissionsList = document.getElementById('submissionsList');
            
            loadingIndicator.style.display = 'block';
            submissionsList.innerHTML = '';
            
            try {
                // Get filter values
                const statusFilter = document.getElementById('statusFilter').value;
                const categoryFilter = document.getElementById('categoryFilter').value;
                const dateFilter = document.getElementById('dateFilter').value;
                
                // Build query parameters
                const params = new URLSearchParams();
                if (statusFilter) params.append('status', statusFilter);
                if (categoryFilter) params.append('category', categoryFilter);
                if (dateFilter) params.append('date', dateFilter);
                
                const response = await fetch(`../../api/admin/craft-validation-submissions.php?${params}`);
                const data = await response.json();
                
                loadingIndicator.style.display = 'none';
                
                if (data.success) {
                    submissions = data.submissions;
                    renderSubmissions();
                } else {
                    submissionsList.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${data.message}</p></div>`;
                }
            } catch (error) {
                loadingIndicator.style.display = 'none';
                submissionsList.innerHTML = `<div class="empty-state"><h3>Error</h3><p>Failed to load submissions</p></div>`;
                console.error('Error loading submissions:', error);
            }
        }

        // Render submissions
        function renderSubmissions() {
            const submissionsList = document.getElementById('submissionsList');
            
            if (submissions.length === 0) {
                submissionsList.innerHTML = `
                    <div class="empty-state">
                        <h3>No Submissions Found</h3>
                        <p>No practice image submissions match the current filters.</p>
                    </div>
                `;
                return;
            }
            
            submissionsList.innerHTML = submissions.map(submission => renderSubmissionCard(submission)).join('');
        }

        // Render individual submission card
        function renderSubmissionCard(submission) {
            const statusClass = `status-${submission.overall_status}`;
            const statusText = submission.overall_status.charAt(0).toUpperCase() + submission.overall_status.slice(1);
            
            return `
                <div class="submission-card">
                    <div class="submission-header">
                        <div class="submission-info">
                            <div class="submission-title">
                                ${submission.tutorial_title} - ${submission.user_email}
                            </div>
                            <div class="submission-meta">
                                Upload ID: ${submission.upload_id} | 
                                Category: ${submission.tutorial_category} | 
                                Uploaded: ${formatDate(submission.upload_date)}
                            </div>
                        </div>
                        <div class="status-badge ${statusClass}">
                            ${statusText}
                        </div>
                    </div>
                    
                    <div class="submission-content">
                        ${submission.description ? `<p><strong>Description:</strong> ${submission.description}</p>` : ''}
                        
                        <div class="images-grid">
                            ${submission.images.map(image => renderImageAnalysis(image, submission)).join('')}
                        </div>
                    </div>
                    
                    ${submission.overall_status === 'pending' || submission.overall_status === 'flagged' ? renderAdminActions(submission) : ''}
                </div>
            `;
        }

        // Render image analysis
        function renderImageAnalysis(image, submission) {
            const craftValidation = image.craft_validation || {};
            const authenticity = image.authenticity || {};
            
            return `
                <div class="image-analysis">
                    <img src="../../uploads/practice/${image.stored_name}" 
                         alt="${image.original_name}" 
                         class="image-preview"
                         onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjVmNWY1Ii8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkltYWdlIG5vdCBmb3VuZDwvdGV4dD48L3N2Zz4='">
                    
                    <div class="image-details">
                        <div class="image-filename">${image.original_name}</div>
                        
                        <div class="validation-results">
                            ${renderCraftValidation(craftValidation)}
                            ${renderAuthenticityValidation(authenticity)}
                            ${renderAIWarnings(image)}
                        </div>
                        
                        <button class="btn metadata-toggle" onclick="toggleMetadata('${image.image_id}')">
                            📊 View Metadata
                        </button>
                        <div id="metadata-${image.image_id}" class="metadata-details">
                            ${renderMetadata(image)}
                        </div>
                    </div>
                </div>
            `;
        }

        // Render craft validation results
        function renderCraftValidation(craftValidation) {
            if (!craftValidation || !craftValidation.craft_classification) {
                return '<div class="validation-section"><div class="validation-title">Craft Classification: Not Available</div></div>';
            }
            
            const classification = craftValidation.craft_classification;
            const categoryMatch = craftValidation.category_match || {};
            
            let confidenceClass = 'confidence-low';
            if (classification.confidence >= 0.8) confidenceClass = 'confidence-high';
            else if (classification.confidence >= 0.5) confidenceClass = 'confidence-medium';
            
            return `
                <div class="validation-section">
                    <div class="validation-title">🎨 Craft Classification</div>
                    <div><strong>Predicted:</strong> ${classification.predicted_category || 'Unknown'}</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill ${confidenceClass}" style="width: ${(classification.confidence * 100)}%"></div>
                    </div>
                    <div>Confidence: ${(classification.confidence * 100).toFixed(1)}%</div>
                    
                    <div style="margin-top: 10px;">
                        <strong>Category Match:</strong> 
                        <span style="color: ${categoryMatch.matches ? '#27ae60' : '#e74c3c'}">
                            ${categoryMatch.matches ? '✅ Matches' : '❌ Mismatch'}
                        </span>
                    </div>
                    
                    ${classification.all_predictions && classification.all_predictions.length > 1 ? `
                        <div style="margin-top: 10px;">
                            <strong>All Predictions:</strong>
                            <div class="prediction-list">
                                ${classification.all_predictions.slice(0, 3).map(pred => `
                                    <div class="prediction-item">
                                        <span>${pred.name || pred.category}</span>
                                        <span>${(pred.confidence * 100).toFixed(1)}%</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // Render authenticity validation results
        function renderAuthenticityValidation(authenticity) {
            return `
                <div class="validation-section">
                    <div class="validation-title">🔍 Authenticity Check</div>
                    <div><strong>Status:</strong> ${authenticity.status || 'Unknown'}</div>
                    <div><strong>Images Compared:</strong> ${authenticity.images_compared || 0}</div>
                    ${authenticity.similar_image ? `
                        <div style="color: #e67e22;"><strong>⚠️ Similar Image Found</strong></div>
                    ` : ''}
                    ${authenticity.explanation ? `
                        <div style="margin-top: 5px; font-size: 0.9rem; color: #666;">
                            ${authenticity.explanation}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // Render AI warnings
        function renderAIWarnings(image) {
            const warnings = [];
            
            if (image.craft_validation && image.craft_validation.ai_generated_detection) {
                const aiDetection = image.craft_validation.ai_generated_detection;
                if (aiDetection.is_ai_generated) {
                    warnings.push(`🤖 AI-Generated: ${aiDetection.detected_generator} (${aiDetection.confidence})`);
                } else if (aiDetection.confidence === 'suspicious') {
                    warnings.push('🔍 Suspicious AI patterns detected');
                }
            }
            
            if (image.authenticity && image.authenticity.ai_warning) {
                warnings.push(`⚠️ ${image.authenticity.ai_warning}`);
            }
            
            if (warnings.length === 0) return '';
            
            return `
                <div class="ai-warning">
                    <strong>AI Analysis Warnings:</strong><br>
                    ${warnings.join('<br>')}
                </div>
            `;
        }

        // Render metadata
        function renderMetadata(image) {
            const metadata = [];
            
            if (image.file_size) {
                metadata.push(`File Size: ${formatFileSize(image.file_size)}`);
            }
            
            if (image.authenticity && image.authenticity.metadata_notes) {
                metadata.push(`Technical: ${image.authenticity.metadata_notes}`);
            }
            
            if (image.craft_validation && image.craft_validation.ai_generated_detection && image.craft_validation.ai_generated_detection.metadata_analysis) {
                const analysis = image.craft_validation.ai_generated_detection.metadata_analysis;
                if (analysis.technical_info) {
                    const tech = analysis.technical_info;
                    metadata.push(`Dimensions: ${tech.width}x${tech.height}`);
                }
            }
            
            return metadata.length > 0 ? metadata.join('<br>') : 'No metadata available';
        }

        // Render admin actions
        function renderAdminActions(submission) {
            return `
                <div class="admin-actions">
                    <input type="text" class="admin-notes" id="notes-${submission.upload_id}" 
                           placeholder="Admin notes (optional)...">
                    <button class="btn btn-approve" onclick="approveSubmission(${submission.upload_id})">
                        ✅ Approve
                    </button>
                    <button class="btn btn-reject" onclick="rejectSubmission(${submission.upload_id})">
                        ❌ Reject
                    </button>
                </div>
            `;
        }

        // Toggle metadata display
        function toggleMetadata(imageId) {
            const metadata = document.getElementById(`metadata-${imageId}`);
            metadata.classList.toggle('show');
        }

        // Approve submission
        async function approveSubmission(uploadId) {
            const notes = document.getElementById(`notes-${uploadId}`).value;
            
            if (!confirm('Are you sure you want to approve this submission?')) {
                return;
            }
            
            try {
                const response = await fetch('../../api/admin/craft-validation-decision.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        upload_id: uploadId,
                        decision: 'approved',
                        admin_notes: notes
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Submission approved successfully!');
                    loadSubmissions();
                    loadStats();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Error approving submission');
                console.error('Error:', error);
            }
        }

        // Reject submission
        async function rejectSubmission(uploadId) {
            const notes = document.getElementById(`notes-${uploadId}`).value;
            
            if (!notes.trim()) {
                alert('Please provide a reason for rejection in the admin notes.');
                return;
            }
            
            if (!confirm('Are you sure you want to reject this submission?')) {
                return;
            }
            
            try {
                const response = await fetch('../../api/admin/craft-validation-decision.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        upload_id: uploadId,
                        decision: 'rejected',
                        admin_notes: notes
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Submission rejected successfully!');
                    loadSubmissions();
                    loadStats();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Error rejecting submission');
                console.error('Error:', error);
            }
        }

        // Utility functions
        function formatDate(dateString) {
            return new Date(dateString).toLocaleString();
        }

        function formatFileSize(bytes) {
            if (bytes >= 1048576) {
                return (bytes / 1048576).toFixed(1) + ' MB';
            } else if (bytes >= 1024) {
                return (bytes / 1024).toFixed(1) + ' KB';
            } else {
                return bytes + ' bytes';
            }
        }
    </script>
</body>
</html>
